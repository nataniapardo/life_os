<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyApp Site Customizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    
    <!-- LEFT PANEL: CONTROLS -->
    <aside class="customizer-panel">
      <h1>MyApp Site Customizer</h1>
      <p class="subtitle">Customize your website like a Notion-style site builder.</p>

      <div class="control-group">
        <label for="siteTitle">Site Title</label>
        <input type="text" id="siteTitle" value="My Personal Website" />
      </div>

      <div class="control-group">
        <label for="siteDescription">Site Description</label>
        <textarea id="siteDescription" rows="3">A clean, simple, customizable website built with MyApp.</textarea>
      </div>

      <div class="control-group">
        <label for="faviconInput">Favicon (Emoji)</label>
        <input type="text" id="faviconInput" value="🌐" maxlength="2" />
      </div>

      <div class="control-group">
        <label for="themeSelect">Theme</label>
        <select id="themeSelect">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="control-group checkbox-group">
        <label><input type="checkbox" id="toggleBreadcrumbs" checked /> Show Breadcrumbs</label>
      </div>

      <div class="control-group checkbox-group">
        <label><input type="checkbox" id="toggleSearch" checked /> Show Search Bar</label>
      </div>

      <div class="control-group">
        <label for="shareImageUrl">Share Preview Image URL</label>
        <input type="text" id="shareImageUrl" value="https://via.placeholder.com/600x300?text=Preview+Image" />
      </div>

      <button id="applyButton">Apply Customization</button>
    </aside>

    <!-- RIGHT PANEL: LIVE PREVIEW -->
    <main class="preview-panel">
      <div id="websitePreview" class="website-preview light-theme">
        
        <header class="site-header">
          <div id="faviconDisplay" class="favicon-display">🌐</div>

          <div class="header-text">
            <h2 id="previewTitle">My Personal Website</h2>
            <p id="previewDescription">A clean, simple, customizable website built with MyApp.</p>
          </div>
        </header>

        <nav id="breadcrumbs" class="breadcrumbs">
          Home > Portfolio > About
        </nav>

        <div id="searchContainer" class="search-container">
          <input type="text" placeholder="Search this site..." />
        </div>

        <section class="hero-section">
          <h3>Live Website Preview</h3>
          <p>This is how your website can look after customization.</p>
          <img id="previewImage" src="https://via.placeholder.com/600x300?text=Preview+Image" alt="Share Preview" />
        </section>

        <footer class="site-footer"></footer>
      </div>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
