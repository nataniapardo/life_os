<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Enterprise Workspace</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Inter:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="logged-out" id="globalBody">

    <section id="login" class="page view-section">
        <div class="auth-page-container">
            <div class="auth-logo-large">
                <div class="logo-area papyrus-font">
                    <span>LIFE</span>
                    <div class="oval-spinner"></div>
                    <span>OS</span>
                </div>
            </div>
            <div class="auth-card glass-card">
                <h2>System Access</h2>
                <input type="text" id="loginId" placeholder="Username or Email">
                <input type="password" id="loginPass" placeholder="Password">
                <button class="btn-glow" onclick="login()">Enter OS</button>
            </div>
        </div>
    </section>

    <div id="appContainer" class="app-container hidden">
        <nav class="sidebar">
            <div class="logo-area-branding papyrus-font">
                <span>LIFE</span>
                <div class="oval-spinner small"></div>
                <span>OS</span>
            </div>
            
            <ul class="nav-links">
                <li class="active" onclick="switchPage('nexus')"><i data-lucide="layout"></i> Nexus</li>
                <li onclick="switchPage('tasks')"><i data-lucide="columns"></i> Kanban</li>
                <li onclick="switchPage('timer-page')"><i data-lucide="timer"></i> Timers</li>
                <li onclick="switchPage('database')"><i data-lucide="database"></i> Records</li>
                <li onclick="switchPage('vault')"><i data-lucide="edit-3"></i> Editor</li>
            </ul>
        </nav>

        <main class="main-layout">
            <header class="top-bar">
                <div class="header-left"><div id="aiStatus" class="ai-status">AI: Operational</div></div>
                
                <div class="header-right">
                    <div class="datetime-block">
                        <div id="dateDisplay" class="date-text">--</div>
                        <div id="clockDisplay" class="time-text">00:00:00</div>
                    </div>

                    <div class="search-wrapper">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="globalSearch" placeholder="Search Life OS...">
                    </div>

                    <div class="profile-area">
                        <div class="profile-trigger" onclick="toggleProfileMenu()">
                            <div id="userAvatar" class="avatar-circle">JD</div>
                        </div>
                        <div id="profileDropdown" class="dropdown-menu glass-card hidden">
                            <ul>
                                <li onclick="switchPage('guide')"><i data-lucide="book-open"></i> Guide</li>
                                <li onclick="switchPage('settings')"><i data-lucide="settings"></i> Settings</li>
                                <li onclick="logout()" class="logout-item"><i data-lucide="log-out"></i> Log Out</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </header>

            <div id="contentSections">
                <section id="settings" class="view-section hidden">
                    <h1>System Settings</h1>
                    <div class="settings-grid">
                        <div class="glass-card">
                            <h3>Workspace Customization</h3>
                            <label>Interface Font</label>
                            <select id="fontSelector" onchange="changeGlobalFont()">
                                <option value="'Plus Jakarta Sans', sans-serif">Jakarta Sans (Default)</option>
                                <option value="'Inter', sans-serif">Inter Professional</option>
                                <option value="'Roboto Mono', monospace">Terminal Mono</option>
                                <option value="serif">Classic Serif</option>
                                <option value="Papyrus, serif">Papyrus</option>
                            </select>
                            
                            <label style="margin-top:20px; display:block;">Accent Color</label>
                            <input type="color" id="accentPicker" value="#00f2ff" onchange="applyCustomTheme()">
                        </div>
                    </div>
                </section>

                <section id="nexus" class="view-section"><h1>Nexus</h1></section>
                <section id="tasks" class="view-section hidden"><h1>Kanban</h1></section>
                <section id="timer-page" class="view-section hidden"><h1>Timers</h1></section>
                <section id="database" class="view-section hidden"><h1>Records</h1></section>
                <section id="vault" class="view-section hidden"><h1>Editor</h1></section>
                <section id="guide" class="view-section hidden"><h1>Guide</h1></section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
