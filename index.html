<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Enterprise Workspace</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="logged-out">

    <section id="login" class="page view-section">
        <div class="auth-page-container">
            <div class="auth-logo-large">
                <div class="logo-area">
                    <span class="logo-text-massive">LIFE</span>
                    <div class="globe-container"><div class="globe-core"></div></div>
                    <span class="logo-text-massive">OS</span>
                </div>
            </div>
            <div class="auth-card glass-card">
                <h2>Initialize Session</h2>
                <input type="text" id="loginId" placeholder="Username or Email">
                <input type="password" id="loginPass" placeholder="Password">
                <button class="btn-glow" onclick="login()">Enter Workspace</button>
            </div>
        </div>
    </section>

    <div id="appContainer" class="app-container hidden">
        <nav class="sidebar">
            <div class="logo-area-branding">
                <span>LIFE</span>
                <div class="globe-container small"><div class="globe-core"></div></div>
                <span>OS</span>
            </div>
            
            <div class="sidebar-scroll">
                <ul class="nav-links">
                    <li class="active" onclick="switchPage('nexus')"><i data-lucide="layout"></i> Nexus</li>
                    <li onclick="switchPage('tasks')"><i data-lucide="columns"></i> Kanban Board</li>
                    <li onclick="switchPage('database')"><i data-lucide="database"></i> Databases</li>
                    <li onclick="switchPage('tools')"><i data-lucide="calculator"></i> System Tools</li>
                    <li onclick="switchPage('vault')"><i data-lucide="edit-3"></i> Content Creation</li>
                </ul>
            </div>
        </nav>

        <main class="main-layout">
            <header class="top-bar">
                <div class="header-left"><div id="aiStatus" class="ai-status">AI: Operational</div></div>
                <div class="header-right">
                    <div class="datetime-block">
                        <div id="dateDisplay" class="date-text">--</div>
                        <div id="clockDisplay" class="time-text">00:00:00</div>
                    </div>
                    <div class="search-wrapper">
                        <input type="text" id="globalSearch" placeholder="Search Life OS...">
                        <i data-lucide="search"></i>
                    </div>
                    <div class="profile-cluster">
                        <i data-lucide="bell" class="icon-btn"></i>
                        <div class="profile-icon">JD</div>
                    </div>
                </div>
            </header>

            <div id="contentSections">
                <section id="tasks" class="view-section hidden">
                    <div class="section-header"><h1>Workflow</h1></div>
                    <div class="kanban-container" id="kanbanBoard"></div>
                </section>

                <section id="database" class="view-section hidden">
                    <h1>Linked Databases</h1>
                    <div class="glass-card">
                        <table class="db-table">
                            <thead>
                                <tr><th>Title</th><th>Status</th><th>Deadline</th><th>Formula</th></tr>
                            </thead>
                            <tbody id="db-body"></tbody>
                        </table>
                    </div>
                </section>

                <section id="vault" class="view-section hidden">
                    <div class="editor-container glass-card">
                        <div class="toolbar">
                            <button onclick="execCmd('bold')">B</button>
                            <button onclick="execCmd('italic')">I</button>
                        </div>
                        <div id="editor" contenteditable="true" placeholder="Start typing..."></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
