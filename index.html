<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Productivity Command Center | Local OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="appContainer" class="main-layout">
        <header class="header">
            <h1 class="brand">AI PRODUCTIVITY COMMAND CENTER</h1>
            <div class="search-bar">
                <input type="text" id="globalSearch" placeholder="Search tasks or Hex Code (#ff0055)..." onkeyup="handleSearch()">
                <div id="clock">00:00:00</div>
            </div>
        </header>

        <div class="content-grid">
            <section class="card ai-module">
                <h3><i data-lucide="brain"></i> Neural Processor</h3>
                <p class="subtitle">Data is saved locally to your browser storage.</p>
                <textarea id="taskInput" placeholder="Paste your plan here... e.g. Finish chemistry project by 5pm #urgent"></textarea>
                <div class="controls">
                    <button id="processBtn" class="btn-main" onclick="processTask()">
                        <i data-lucide="zap"></i> Process & Save
                    </button>
                    <input type="color" id="themePicker" onchange="changeTheme(this.value)">
                </div>
            </section>

            <section class="card task-module">
                <h3>Objectives Tracker</h3>
                <div id="taskList" class="task-container">
                    </div>
                <button class="btn-clear" onclick="clearAllTasks()">Clear Memory</button>
            </section>
        </div>

        <div id="toast" class="hidden"></div>
    </div>
</body>
</html>
