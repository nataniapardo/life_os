<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Assistant Demo (Improved)</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  border-radius: 8px;
}

button {
  margin-top: 10px;
  float: right;
  padding: 10px 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.lists {
  display: flex;
  gap: 20px;
  margin-top: 60px;
}

.box {
  flex: 1;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.high { color: red; font-weight: bold; }
.medium { color: orange; }
.low { color: green; }

.meeting {
  border-bottom: 1px solid #eee;
  padding: 8px 0;
}

.date {
  font-weight: bold;
  color: #007bff;
}
</style>
</head>

<body>

<div class="container">
<h2>AI Assistant (Smart Demo)</h2>

<textarea id="inputText" placeholder="Example:
URGENT meeting April 30 at 2pm
Study tomorrow morning
Buy groceries tonight
Low priority clean room"></textarea>

<button onclick="organize()">Organize</button>

<div class="lists">
  <div class="box">
    <h3>To-Do List</h3>
    <ul id="todoList"></ul>
  </div>

  <div class="box">
    <h3>Calendar</h3>
    <div id="calendar"></div>
  </div>
</div>
</div>

<script>
function organize() {
  const input = document.getElementById("inputText").value;
  const lines = input.split("\n");

  const tasks = [];
  const meetings = [];

  lines.forEach(line => {
    const text = line.trim();
    if (!text) return;

    const priority = detectPriority(text);
    const date = extractDate(text);
    const time = extractTime(text);

    if (date !== "No date" || time !== "No time") {
      meetings.push({ title: text, date, time, priority });
    } else {
      tasks.push({ title: text, priority });
    }
  });

  renderTasks(tasks);
  renderMeetings(meetings);
}

function detectPriority(text) {
  const lower = text.toLowerCase();

  if (lower.includes("urgent") || lower.includes("asap") || lower.includes("high")) {
    return "high";
  }
  if (lower.includes("low")) {
    return "low";
  }
  return "medium";
}

function extractTime(text) {
  const lower = text.toLowerCase();

  // explicit time
  const match = text.match(/\b(\d{1,2})(:\d{2})?\s?(am|pm)\b/i);
  if (match) return match[0];

  // natural time words
  if (lower.includes("morning")) return "9:00 AM";
  if (lower.includes("afternoon")) return "2:00 PM";
  if (lower.includes("evening")) return "6:00 PM";
  if (lower.includes("tonight")) return "8:00 PM";

  return "No time";
}

function extractDate(text) {
  const lower = text.toLowerCase();
  const today = new Date();

  if (lower.includes("today")) {
    return today.toDateString();
  }

  if (lower.includes("tomorrow")) {
    const d = new Date();
    d.setDate(today.getDate() + 1);
    return d.toDateString();
  }

  const months = {
    january:0,february:1,march:2,april:3,may:4,june:5,
    july:6,august:7,september:8,october:9,november:10,december:11
  };

  for (let month in months) {
    if (lower.includes(month)) {
      const dayMatch = text.match(/\d{1,2}/);
      if (dayMatch) {
        const d = new Date();
        d.setMonth(months[month]);
        d.setDate(parseInt(dayMatch[0]));
        return d.toDateString();
      }
    }
  }

  return "No date";
}

function renderTasks(tasks) {
  const list = document.getElementById("todoList");
  list.innerHTML = "";

  tasks.forEach(task => {
    const li = document.createElement("li");
    li.className = task.priority;
    li.textContent = `[${task.priority.toUpperCase()}] ${task.title}`;
    list.appendChild(li);
  });
}

function renderMeetings(meetings) {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  meetings.forEach(m => {
    const div = document.createElement("div");
    div.className = "meeting " + m.priority;

    div.innerHTML = `
      <div class="date">${m.date}</div>
      <div>[${m.priority.toUpperCase()}] ${m.title}</div>
      <div>${m.time}</div>
    `;

    calendar.appendChild(div);
  });
}
</script>

</body>
</html>
