<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | AI Productivity Workspace</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body id="globalBody">

    <div id="appContainer" class="app-container">
        <nav class="sidebar">
            <div class="logo-area-branding" id="sideLogo" onclick="goToHome()">
                <span>LIFE</span>
                <div class="earth-globe-small">
                    <div class="earth-surface"></div>
                </div>
                <span>OS</span>
            </div>
            <ul class="nav-links">
                <li class="active" onclick="switchPage('nexus')"><i data-lucide="layout"></i> <span>Nexus</span></li>
                <li onclick="switchPage('tasks')"><i data-lucide="columns"></i> <span>Kanban</span></li>
                <li onclick="switchPage('timer-page')"><i data-lucide="timer"></i> <span>Timers</span></li>
                <li onclick="switchPage('database')"><i data-lucide="database"></i> <span>Records</span></li>
                <li onclick="switchPage('vault')"><i data-lucide="edit-3"></i> <span>Editor</span></li>
            </ul>
        </nav>

        <main class="main-layout">
            <header class="top-bar">
                <div class="header-left">
                    <div id="aiStatus" class="ai-status">AI: Operational</div>
                    <h1 class="welcome-text">Welcome back</h1>
                </div>

                <div class="search-wrapper">
                    <div class="search-input-container">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="globalSearch" placeholder="Search Life OS...">
                    </div>
                </div>

                <div class="header-right">
                    <div class="datetime-block">
                        <div id="dateDisplay" class="date-text">Tue, May 19</div>
                        <div id="clockDisplay" class="time-text">12:47:06</div>
                    </div>
                    <button class="btn-glow" id="openQuickAction">+ QUICK ADD</button>
                    <div class="profile-area">
                        <div class="avatar-circle" onclick="toggleProfileMenu()">JD</div>
                    </div>
                </div>
            </header>

            <div id="contentSections">
                <section id="nexus" class="view-section">
                    </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
