<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zen OS | Command Center</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark-mode">
  <div class="app-container">
    
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-wrap">
            <span class="logo-text">Life</span>
            <div class="globe-container">
                <div class="globe"></div>
            </div>
            <span class="logo-text">OS</span>
        </div>
      </div>

      <nav class="nav-menu">
        <a href="#" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">Journal</a>
        <a href="#" class="nav-item">Blueprint</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="welcome-area">
          <h1>Peaceful Productivity</h1>
          <p>Flow through your objectives with intention.</p>
        </div>

        <div class="utility-cluster">
            <div class="date-time-cluster">
                <span id="currentTime">00:00:00</span>
                <span id="currentDate">Loading Date...</span>
            </div>
            
            <button class="theme-toggle" id="themeToggle" title="Switch Theme">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>

            <div class="profile-wrapper">
                <div class="profile-trigger" id="profileBtn">
                    <div class="profile-avatar">👤</div>
                    <div class="profile-menu hidden" id="profileMenu">
                        <div class="menu-header">Settings & Profile</div>
                        <button onclick="toggleSettings()">🎨 System Customization</button>
                        <button onclick="handleLogout()">🚪 Log Out</button>
                    </div>
                </div>
            </div>
        </div>
      </header>

      <section class="zen-grid">
        <div class="card main-checklist">
          <div class="card-header">
            <h2>Primary Objectives</h2>
            <button class="add-task-btn" id="openQuickAction">+</button>
          </div>
          <ul class="check-list" id="taskList">
            <li><label><input type="checkbox" /> Deep work: Strategic planning</label></li>
            <li><label><input type="checkbox" /> Networking: Media Outreach</label></li>
            <li><label><input type="checkbox" /> Skill building: Design block</label></li>
          </ul>
        </div>

        <div class="card stats-card">
            <h3>Focus Energy</h3>
            <div class="stat-circle">
                <span id="taskCount">0</span>
                <small>Tasks Left</small>
            </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal hidden" id="settingsModal">
    <div class="modal-content zen-modal">
      <h2>System Customization</h2>
      <div class="setting-group">
        <label>Primary Accent Color</label>
        <div class="color-options">
            <button class="color-swatch" style="background: #a3b18a;" onclick="changeAccent('#a3b18a')"></button>
            <button class="color-swatch" style="background: #e9edc9;" onclick="changeAccent('#e9edc9')"></button>
            <button class="color-swatch" style="background: #606c38;" onclick="changeAccent('#606c38')"></button>
            <button class="color-swatch" style="background: #00f2ff;" onclick="changeAccent('#00f2ff')"></button>
            <input type="color" id="customColor" onchange="changeAccent(this.value)">
        </div>
      </div>
      <button class="close-btn" onclick="toggleSettings()">Done</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
