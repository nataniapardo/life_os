<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Notion Clone</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Pages</h2>
    <div id="pagesList"></div>
    <button id="newPageBtn">+ New Page</button>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="top-bar">
      <div id="greeting"></div>

      <div class="profile">
        <span id="profileIcon">👤</span>
        <div id="notificationPanel" class="hidden">
          <h4>Notifications</h4>
          <div id="notifications"></div>
          <button id="clearNotifications">Clear All</button>
        </div>
      </div>

      <button id="themeToggle">🌙</button>
    </div>

    <input id="nameInput" placeholder="Enter your name..." />
    <button onclick="saveName()">Save Name</button>

    <h1 id="pageTitle">Select a page</h1>

    <textarea id="notes" placeholder="Write notes..."></textarea>
    <button id="aiBtn">Organize with AI</button>

    <div class="planner">
      <h2>Daily Plan</h2>
      <button id="planBtn">Generate Plan</button>
      <pre id="planOutput"></pre>
    </div>

    <h2>Tasks</h2>
    <div id="tasks"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
