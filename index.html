<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life OS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<header>
  <h1 onclick="goHome()" class="logo">Life OS</h1>
  <div id="clock"></div>
</header>

<aside>
  <h3>Navigation</h3>
  <ul>
    <li onclick="switchPage('home')">Home</li>
    <li onclick="switchPage('dashboard')">Dashboard</li>
    <li onclick="switchPage('login')">Login</li>
    <li onclick="switchPage('signup')">Sign Up</li>
  </ul>
</aside>

<main>

<!-- HOME -->
<section id="home" class="page active">
  <div class="card">
    <h2>Welcome to Life OS</h2>
    <p>Your all-in-one life productivity system.</p>
  </div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="page">
  <div class="card">
    <h2>Dashboard</h2>
    <p>This page is only visible after login.</p>

    <input id="taskInput" placeholder="Add task">
    <button onclick="addTask()">Add Task</button>
    <ul id="taskList"></ul>
  </div>
</section>

<!-- LOGIN -->
<section id="login" class="page">
  <div class="card">
    <h2>Login</h2>

    <input id="loginUser" placeholder="Username">
    <input id="loginPass" placeholder="Password" type="password">

    <button onclick="login()">Login</button>
  </div>
</section>

<!-- SIGN UP -->
<section id="signup" class="page">
  <div class="card">
    <h2>Sign Up</h2>

    <input id="signUser" placeholder="Username">
    <input id="signPass" placeholder="Password" type="password">

    <button onclick="signup()">Create Account</button>
  </div>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
