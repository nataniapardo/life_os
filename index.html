<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifePlan AI | Professional Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">LifePlan AI</div>
            <ul class="nav-links">
                <li class="active">Dashboard</li>
                <li>Calendar</li>
                <li>Networking (LinkedIn)</li>
                <li>Documents</li>
                <li>Settings</li>
            </ul>
            <div class="user-controls">
                <input type="color" id="colorPicker" title="Choose Theme Color">
                <input type="text" id="hexInput" placeholder="#ffffff" maxlength="7">
            </div>
        </nav>

        <main class="content">
            <header class="top-bar">
                <div class="search-container">
                    <input type="text" id="globalSearch" placeholder="Search sectors, synonyms, or keywords...">
                </div>
                <button class="upload-btn" onclick="triggerUpload()">Upload Plan Document</button>
                <input type="file" id="docUpload" hidden>
            </header>

            <section class="dashboard-grid">
                <div class="card todo-card">
                    <h3>Daily Life Plan <span id="currentDate"></span></h3>
                    <div class="error-alert" id="aiAlert">Note: 2 entries require manual verification.</div>
                    <ul id="todoList">
                        </ul>
                </div>

                <div class="card networking-card">
                    <h3>Industry Mentors & Leads</h3>
                    <div class="contact-list" id="contactList">
                        <p class="placeholder">Upload LinkedIn data to populate...</p>
                    </div>
                </div>

                <div class="card progress-card">
                    <h3>Plan Progress</h3>
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <p id="progressText">0% of milestones reached</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
