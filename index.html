<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life OS Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Life OS Dashboard</h1>
    <input type="text" id="searchBox" placeholder="Search (keywords, tasks, notes...)">
  </header>

  <!-- SIDEBAR -->
  <aside>
    <h3>Customize</h3>
    
    <label>Background Color:</label>
    <input type="color" id="colorPicker">

    <label>HEX Code:</label>
    <input type="text" id="hexInput" placeholder="#ffffff">
    
    <label>Upload Background:</label>
    <input type="file" id="bgUpload">

    <button onclick="applyHex()">Apply HEX</button>
  </aside>

  <!-- MAIN DASHBOARD -->
  <main>

    <!-- CALENDAR / DUE DATE -->
    <section class="card">
      <h2>📅 Due Dates</h2>
      <input type="date" id="dueDate">
      <button onclick="addDueDate()">Add Date</button>
      <ul id="dateList"></ul>
    </section>

    <!-- TASKS -->
    <section class="card">
      <h2>✅ Daily Tasks</h2>
      <input type="text" id="taskInput" placeholder="Enter task...">
      <button onclick="addTask()">Add Task</button>
      <ul id="taskList"></ul>
    </section>

    <!-- NOTES -->
    <section class="card">
      <h2>🧠 Notes / Ideas</h2>
      <textarea id="notes" placeholder="Write notes..."></textarea>
    </section>

    <!-- CONTACTS -->
    <section class="card">
      <h2>👥 Contacts</h2>
      <input type="text" id="contactInput" placeholder="Name - Role - Company">
      <button onclick="addContact()">Add Contact</button>
      <ul id="contactList"></ul>
    </section>

    <!-- ALERTS -->
    <section class="card">
      <h2>⚠️ Alerts</h2>
      <p id="alertBox">No issues detected</p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
