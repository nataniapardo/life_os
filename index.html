<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Neural Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js" defer></script>
</head>
<body class="theme-futuristic">
    <div class="productivity-simulation">
        <div class="sim-column" id="simTasks"></div>
        <div class="sim-column" id="simCalendar"></div>
        <div class="sim-column" id="simAccomplishments"></div>
    </div>

    <section id="authPage" class="auth-container">
        <div class="glass-card auth-card animate-in">
            <div class="branding-hero">
                <h1 class="brand-large">Life OS</h1>
                <div class="globe-wrapper">
                    <div class="globe-orbit"></div>
                    <div class="globe-core"></div>
                </div>
            </div>
            <div id="loginForm">
                <h2>System Access</h2>
                <div class="input-group">
                    <input type="email" id="emailInput" placeholder="Neural ID (Email)" required>
                </div>
                <div class="input-group">
                    <input type="password" id="passInput" placeholder="Access Key" required>
                </div>
                <button class="btn-glow-large" onclick="handleAuth('login')">Initialize</button>
                <p class="auth-toggle">New user? <span onclick="toggleAuthMode()">Create an Account</span></p>
            </div>
        </div>
    </section>

    <div id="appContainer" class="app-container hidden">
        <nav class="sidebar">
            <div class="logo-area-branding"><span>Life OS</span></div>
            <div class="nav-section">
                <h3>Fragments</h3>
                <div id="pagesList" class="custom-nav-list"></div>
                <button class="btn-outline-dash" onclick="createNewPage()">+ New Page</button>
            </div>
            <ul class="nav-links">
                <li class="active" onclick="switchPage('home')"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></li>
                <li onclick="switchPage('settings')"><i data-lucide="settings"></i><span>Settings</span></li>
            </ul>
        </nav>

        <main class="main-layout">
            <header class="top-bar">
                <div class="header-left">
                    <div id="greeting" class="greeting-text">Initializing...</div>
                    <input id="nameInput" placeholder="Set identity..." class="glass-input-small">
                    <button class="btn-glow-small" onclick="saveName()">Update</button>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <input type="text" id="globalSearch" placeholder="Search Keywords/Synonyms..." onkeyup="handleSearch()">
                    </div>
                    <div id="clockDisplay" class="time-text">00:00:00</div>
                    <div class="profile-group" onclick="toggleProfileMenu()">
                        <div id="profileIcon" class="avatar-circle">👤</div>
                    </div>
                </div>
            </header>

            <div class="content-padding">
                <section id="home" class="view-section">
                    <div class="workspace-grid">
                        <div class="glass-card editor-zone">
                            <h3><i data-lucide="sparkles"></i> AI Neural Processor</h3>
                            <textarea id="notes" placeholder="Drop documents or write notes for AI extraction..."></textarea>
                            <div class="action-bar">
                                <button id="aiBtn" class="btn-glow" onclick="aiOrganize()"><i data-lucide="brain"></i> Organize with AI</button>
                                <input type="file" id="docUpload" class="hidden" onchange="handleFileUpload()">
                                <button class="btn-outline" onclick="document.getElementById('docUpload').click()"><i data-lucide="upload"></i> Upload Docs</button>
                            </div>
                        </div>
                        <div class="glass-card planner-zone">
                            <h3>Daily Plan</h3>
                            <div id="planOutput" class="ai-output-box">No plan generated.</div>
                            <button class="btn-outline" onclick="generatePlan()">Generate Life Plan</button>
                        </div>
                    </div>
                    <div class="task-section">
                        <h2>Objectives Tracker</h2>
                        <div id="tasks" class="task-list-grid"></div>
                    </div>
                </section>

                <section id="settings" class="view-section hidden">
                    <div class="glass-card">
                        <h3>Customization & Theme Engine</h3>
                        <div class="config-row">
                            <label>Accent Hex Code</label>
                            <input type="text" id="hexInput" placeholder="#00f2ff" onchange="updateThemeColor(this.value)">
                            <input type="color" id="colorWheel" onchange="updateThemeColor(this.value)">
                        </div>
                        <div class="config-row">
                            <label>Auto-Theme Schedule</label>
                            <input type="time" id="lightTime" value="07:00">
                            <input type="time" id="darkTime" value="19:00">
                            <button class="btn-glow-small" onclick="saveSchedule()">Commit Chronos</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
