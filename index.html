<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | AI Productivity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;700&family=Papyrus&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js" defer></script>
</head>
<body class="theme-futuristic">

    <audio id="timerAlert" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <section id="authPage" class="auth-container">
        <div class="glass-card auth-card">
            <div class="logo-area-branding">
                <span class="brand-text">Life</span>
                <div class="globe-container"><div class="globe"><div class="axis"></div></div></div>
                <span class="brand-text">OS</span>
            </div>
            
            <div id="loginForm">
                <h2>Welcome Back</h2>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="emailInput" placeholder="Email Address">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="passInput" placeholder="Password">
                </div>
                <div class="auth-buttons">
                    <button class="btn-glow" onclick="handleAuth('login')">Log In</button>
                    <button class="btn-outline" onclick="toggleAuthMode()">Sign Up</button>
                </div>
            </div>
        </div>
    </section>

    <div id="appContainer" class="app-container hidden">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo-area-branding">
                    <span class="brand-text">Life OS</span>
                </div>
            </div>
            
            <ul class="nav-links">
                <li class="active" onclick="switchPage('home')"><i data-lucide="home"></i><span>Home</span></li>
                <li onclick="switchPage('tasks')"><i data-lucide="layers"></i><span>Objectives</span></li>
                <li onclick="switchPage('timers')"><i data-lucide="timer"></i><span>Timer</span></li>
                <li onclick="switchPage('calendar')"><i data-lucide="calendar"></i><span>Schedule</span></li>
                <li onclick="switchPage('settings')"><i data-lucide="settings"></i><span>Settings</span></li>
            </ul>

            <div class="add-section-wrap">
                <select id="categorySelector" class="glass-select">
                    <option value="" disabled selected>+ Add Section</option>
                    <option value="notes">Notes</option>
                    <option value="journal">Journal</option>
                </select>
                <button class="btn-outline-dash" onclick="addNewSection()">Confirm</button>
            </div>
        </nav>

        <main class="main-layout">
            <header class="top-bar">
                <div class="header-left">
                    <h2 id="dynamicGreeting">Good Afternoon, User</h2>
                    <p class="sub-text">Welcome back to your command center.</p>
                </div>

                <div class="header-right">
                    <div class="time-container">
                        <div id="dateDisplay" class="date-text"></div>
                        <div id="clockDisplay" class="time-text">00:00:00</div>
                    </div>
                    <div class="profile-area" onclick="toggleProfileMenu()">
                        <div id="userAvatar" class="avatar-circle">
                            <span id="userInitials">US</span>
                            <img id="userAvatarImg" src="" class="hidden">
                        </div>
                        <div id="profileDropdown" class="profile-dropdown glass-card hidden">
                            <button onclick="openProfileSettings()"><i data-lucide="user"></i> Profile</button>
                            <hr>
                            <button onclick="location.reload()" style="color: #ff4d4d;"><i data-lucide="log-out"></i> Logout</button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-padding">
                <section id="home" class="view-section">
                    <div class="apple-calendar-strip" id="appleCalendar"></div>
                    
                    <div class="ai-input-zone glass-card">
                        <h3><i data-lucide="sparkles"></i> AI Command</h3>
                        <div class="task-entry-grid">
                            <input type="text" id="aiTaskInput" placeholder="Command: I have a meeting at 3pm tomorrow...">
                            <button class="btn-glow" onclick="smartAddTask()">Distribute</button>
                        </div>
                    </div>

                    <div class="task-distribution-grid">
                        <div class="task-column glass-card">
                            <h3><i data-lucide="zap"></i> High Priority</h3>
                            <ul id="highTaskList"></ul>
                        </div>
                        <div class="task-column glass-card">
                            <h3><i data-lucide="activity"></i> Balanced</h3>
                            <ul id="midTaskList"></ul>
                        </div>
                    </div>
                </section>
                
                <section id="tasks" class="view-section hidden">
                    <div class="glass-card"><h2>Objectives</h2><p>Manual task management system active.</p></div>
                </section>
            </div>
        </main>
    </div>

    <div id="settingsModal" class="modal-overlay hidden">
        <div class="glass-card modal-content">
            <h3>Profile Settings</h3>
            <div class="input-group">
                <label>Display Name</label>
                <input type="text" id="editFullName" placeholder="Your Name">
            </div>
            <div class="input-group">
                <label>Avatar</label>
                <input type="file" id="profilePicUpload" accept="image/*" onchange="previewImage(this)">
            </div>
            <div class="modal-buttons">
                <button class="btn-glow" onclick="saveProfileChanges()">Save</button>
                <button class="btn-outline" onclick="closeProfileSettings()">Cancel</button>
            </div>
        </div>
    </div>
</body>
</html>
