<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Productivity Command Center | Life OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js" defer></script>
</head>
<body class="theme-executive">
    <div id="appContainer" class="app-layout">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-hex"></div>
                <span>COMMAND CENTER</span>
            </div>
            <nav class="nav-menu">
                <div class="nav-group">
                    <p class="nav-label">Core Systems</p>
                    <button class="nav-item active" onclick="switchPage('dashboard')"><i data-lucide="layout-dashboard"></i> Dashboard</button>
                    <button class="nav-item" onclick="switchPage('planner')"><i data-lucide="calendar"></i> Life Blueprint</button>
                    <button class="nav-item" onclick="switchPage('networking')"><i data-lucide="users"></i> Networking</button>
                </div>
                <div class="nav-group">
                    <p class="nav-label">Neural Config</p>
                    <button class="nav-item" onclick="switchPage('settings')"><i data-lucide="sliders"></i> UI Customization</button>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div id="connectionStatus" class="status-dot"></div>
                <span>System Online</span>
            </div>
        </aside>

        <main class="main-content">
            <header class="global-header">
                <div class="header-search">
                    <i data-lucide="search"></i>
                    <input type="text" id="globalSearch" placeholder="Search objectives, contacts, or hex codes..." onkeyup="handleGlobalSearch()">
                </div>
                <div class="header-tools">
                    <div id="clockDisplay" class="digital-clock">00:00:00</div>
                    <div class="user-profile">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=LifeOS" alt="Avatar">
                    </div>
                </div>
            </header>

            <div class="scroll-container">
                <section id="dashboard" class="view-section">
                    <div class="welcome-banner">
                        <h2 id="greeting">Initializing Neural Link...</h2>
                        <p>Your automated life plan is 84% synchronized.</p>
                    </div>

                    <div class="grid-layout">
                        <div class="glass-card ai-input-node">
                            <div class="card-header">
                                <h3><i data-lucide="brain-circuit"></i> Neural Processor</h3>
                                <span class="ai-badge">AI Active</span>
                            </div>
                            <textarea id="notes" placeholder="Paste work deliverables, meeting notes, or job descriptions here..."></textarea>
                            <div class="button-cluster">
                                <button id="aiBtn" class="btn-primary" onclick="processNeuralInput()">
                                    <i data-lucide="sparkles"></i> Organize with AI
                                </button>
                                <button class="btn-secondary" onclick="triggerFileUpload()">
                                    <i data-lucide="file-up"></i> Upload Documents
                                </button>
                                <input type="file" id="docUpload" class="hidden" onchange="handleFileUpload(event)">
                            </div>
                        </div>

                        <div class="glass-card task-node">
                            <div class="card-header">
                                <h3><i data-lucide="check-square"></i> Objectives Tracker</h3>
                                <button class="btn-icon" onclick="openQuickAdd()"><i data-lucide="plus"></i></button>
                            </div>
                            <div id="tasksContainer" class="item-list">
                                </div>
                        </div>
                    </div>
                </section>

                <section id="settings" class="view-section hidden">
                    <div class="glass-card config-node">
                        <h3>Dashboard Aesthetics</h3>
                        <div class="config-grid">
                            <div class="config-item">
                                <label>Primary Accent Color</label>
                                <div class="color-picker-wrapper">
                                    <input type="color" id="colorWheel" onchange="updateThemeFromPicker(this.value)">
                                    <input type="text" id="hexInput" placeholder="#00f2ff" onchange="updateThemeFromHex(this.value)">
                                </div>
                            </div>
                            <div class="config-item">
                                <label>Background Visuals</label>
                                <button class="btn-secondary" onclick="triggerBgUpload()">Upload Custom Image</button>
                                <input type="file" id="bgUpload" class="hidden" onchange="applyCustomBg(event)">
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <div id="notificationStack"></div>
</body>
</html>
