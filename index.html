<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life OS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Life OS</h1>
  <div id="clock"></div>

  <select id="timezoneSelect">
    <option value="America/New_York">USA (EST)</option>
    <option value="Europe/London">UK</option>
    <option value="Asia/Tokyo">Japan</option>
  </select>

  <input type="text" id="search" placeholder="Search...">
</header>

<aside>
  <ul>
    <li onclick="switchPage('dashboard')">Dashboard</li>
    <li onclick="switchPage('personal')">Personal</li>
    <li onclick="switchPage('work')">Work</li>
    <li onclick="switchPage('calendar')">Calendar</li>
    <li onclick="switchPage('uploads')">Uploads</li>
  </ul>

  <h3>Customize</h3>
  <input type="color" id="colorPicker">
  <input type="text" id="hexInput" placeholder="#ffffff">
  <button onclick="applyHex()">Apply HEX</button>
  <input type="file" id="bgUpload">
</aside>

<main>

  <section id="dashboard" class="page active">
    <div class="card">
      <h2>Tasks</h2>
      <input id="taskInput" placeholder="Add task">
      <button onclick="addTask()">Add</button>
      <ul id="taskList"></ul>
    </div>
  </section>

  <section id="personal" class="page">
    <div class="card">
      <h2>Personal Notes</h2>
      <textarea id="personalNotes"></textarea>
    </div>
  </section>

  <section id="work" class="page">
    <div class="card">
      <h2>Work Notes</h2>
      <textarea id="workNotes"></textarea>
    </div>
  </section>

  <section id="calendar" class="page">
    <div class="card">
      <h2>Calendar</h2>
      <input type="date" id="dateInput">
      <button onclick="addDate()">Add</button>
      <ul id="dateList"></ul>
    </div>
  </section>

  <section id="uploads" class="page">
    <div class="card">
      <h2>Upload Files</h2>
      <input type="file" id="fileUpload" multiple>

      <h3>AI Generated Table</h3>
      <table id="aiTable">
        <thead>
          <tr>
            <th>Type</th>
            <th>Content</th>
            <th>Edit</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
