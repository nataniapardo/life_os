<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | AI Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo-area">
            <span class="logo-text">LIFE</span>
            <div class="globe-container">
                <div class="globe-core"></div>
                <div class="globe-lines"></div>
            </div>
            <span class="logo-text">OS</span>
        </div>

        <ul class="nav-links">
            <li class="active" onclick="showPage('dashboard')"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></li>
            <li onclick="showPage('tasks')"><i data-lucide="check-square"></i> <span>Tasks</span></li>
            <li onclick="showPage('habits')"><i data-lucide="activity"></i> <span>Habits</span></li>
            <li onclick="showPage('documents')"><i data-lucide="file-text"></i> <span>Documents</span></li>
            <li onclick="showPage('contacts')"><i data-lucide="users"></i> <span>Contacts</span></li>
            <li onclick="showPage('appearance')"><i data-lucide="palette"></i> <span>Appearance</span></li>
        </ul>
    </nav>

    <header class="top-bar">
        <div class="header-right">
            <div class="search-wrapper">
                <i data-lucide="search"></i>
                <input type="text" id="globalSearch" placeholder="Search Life OS (Keywords & Synonyms)...">
            </div>
            <div class="profile-container">
                <div class="profile-icon-circle" onclick="toggleProfile()">
                    <span>JD</span>
                </div>
            </div>
        </div>
    </header>

    <main class="content-area">
        <section id="dashboard" class="page">
            <div class="glass-card">
                <h1>Welcome, User</h1>
                <p>Your Life Blueprint is 85% complete.</p>
            </div>
            
            <div class="glass-card">
                <h3><i data-lucide="bot"></i> AI Data Decipher</h3>
                <p>Upload any document (Notes, Resume, To-Do) and let AI organize it.</p>
                <input type="file" id="aiUpload" hidden onchange="handleFileUpload(event)">
                <button class="btn-glow" onclick="document.getElementById('aiUpload').click()">Upload & Organize</button>
                <div id="uploadStatus"></div>
            </div>
        </section>

        <section id="appearance" class="page hidden">
            <div class="glass-card">
                <h2>Appearance Settings</h2>
                <div class="settings-grid">
                    <button class="btn-glow" onclick="toggleStyle('high-contrast')">High Contrast</button>
                    <button class="btn-glow" onclick="toggleStyle('extra-rounded')">Rounded UI</button>
                    <button class="btn-glow" onclick="toggleStyle('neon-mode')">Neon Mode</button>
                </div>
                <div style="margin-top: 20px;">
                    <label>Theme Color Picker:</label>
                    <input type="color" id="colorPicker" onchange="updateThemeColor(this.value)">
                </div>
            </div>
        </section>

        </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
